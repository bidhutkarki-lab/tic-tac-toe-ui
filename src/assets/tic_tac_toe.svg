<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <rect width="512" height="512" rx="96" fill="#F8F9FB"/>
  
  <!-- Grid -->
  <g stroke="#111827" stroke-width="14" stroke-linecap="round" opacity="0.9">
    <!-- Vertical lines -->
    <line x1="192" y1="96" x2="192" y2="416" />
    <line x1="320" y1="96" x2="320" y2="416" />
    <!-- Horizontal lines -->
    <line x1="96" y1="192" x2="416" y2="192" />
    <line x1="96" y1="320" x2="416" y2="320" />
  </g>

  <!-- Top-left: X in blue -->
  <g stroke="#2563EB" stroke-width="16" stroke-linecap="round">
    <line x1="122" y1="122" x2="166" y2="166" />
    <line x1="166" y1="122" x2="122" y2="166" />
  </g>

  <!-- Top-center: O -->
  <circle cx="256" cy="144" r="28" fill="none" stroke="#111827" stroke-width="14" />

  <!-- Top-right: X -->
  <g stroke="#111827" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <line x1="346" y1="122" x2="390" y2="166" />
    <line x1="390" y1="122" x2="346" y2="166" />
  </g>

  <!-- Middle-left: O blue -->
  <circle cx="144" cy="256" r="28" fill="none" stroke="#2563EB" stroke-width="14" />

  <!-- Center: X blue bold -->
  <g stroke="#2563EB" stroke-width="18" stroke-linecap="round">
    <line x1="228" y1="228" x2="284" y2="284" />
    <line x1="284" y1="228" x2="228" y2="284" />
  </g>

  <!-- Middle-right: O -->
  <circle cx="368" cy="256" r="28" fill="none" stroke="#111827" stroke-width="14" />

  <!-- Bottom-left: empty -->

  <!-- Bottom-center: X -->
  <g stroke="#111827" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <line x1="234" y1="346" x2="278" y2="390" />
    <line x1="278" y1="346" x2="234" y2="390" />
  </g>

  <!-- Bottom-right: O blue -->
  <circle cx="368" cy="368" r="28" fill="none" stroke="#2563EB" stroke-width="14" />
</svg>
